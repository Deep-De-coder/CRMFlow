name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          SF_USERNAME: fake@example.com
          SF_PASSWORD: fakepassword
          SF_SECURITY_TOKEN: faketoken
          SF_DOMAIN: login
          APP_ENV: test
          LOG_LEVEL: WARNING
        run: pytest tests/unit -m unit -v --cov=app --cov-report=xml

      - name: Run integration tests
        env:
          SF_USERNAME: fake@example.com
          SF_PASSWORD: fakepassword
          SF_SECURITY_TOKEN: faketoken
          SF_DOMAIN: login
          APP_ENV: test
          LOG_LEVEL: WARNING
        run: pytest tests/integration -m integration -v --cov=app --cov-report=xml --cov-append

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check app/ tests/

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t salesforce-sync:ci .

      - name: Verify image starts
        run: |
          docker run --rm -d \
            -e SF_USERNAME=fake@example.com \
            -e SF_PASSWORD=fake \
            -e SF_SECURITY_TOKEN=fake \
            -e SF_DOMAIN=login \
            -p 8000:8000 \
            --name sf-sync-test \
            salesforce-sync:ci
          sleep 3
          curl -f http://localhost:8000/health || (docker logs sf-sync-test && exit 1)
          docker stop sf-sync-test
